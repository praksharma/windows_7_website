<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Win7 Themed Site</title>
  <link rel="stylesheet" href="https://unpkg.com/7.css">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>

  <!-- Desktop icons -->
  <div class="desktop">
    <div class="icon" data-file="about.md" data-title="About Me">
      <img src="https://img.icons8.com/color/48/user.png"/>
      <span>About Me</span>
    </div>
    <div class="icon" data-file="projects.md" data-title="Projects">
      <img src="https://img.icons8.com/color/48/folder-invoices.png"/>
      <span>Projects</span>
    </div>
    <div class="icon" data-file="contact.md" data-title="Contact">
      <img src="https://img.icons8.com/color/48/email.png"/>
      <span>Contact</span>
    </div>
  </div>

  <!-- Taskbar -->
  <div class="taskbar">
    <!-- <button class="start-btn"></button> -->
    <div class="start-btn"></div>
    <div class="taskbar-apps" aria-label="Pinned apps">
      <button class="taskbar-app" data-file="about.md" data-title="About Me" aria-label="Open About Me">
        <img src="https://img.icons8.com/color/48/user.png" alt="" />
      </button>
      <button class="taskbar-app" data-file="projects.md" data-title="Projects" aria-label="Open Projects">
        <img src="https://img.icons8.com/color/48/folder-invoices.png" alt="" />
      </button>
      <button class="taskbar-app" data-file="contact.md" data-title="Contact" aria-label="Open Contact">
        <img src="https://img.icons8.com/color/48/email.png" alt="" />
      </button>
    </div>

    <div class="taskbar-spacer"></div>
    <div class="taskbar-notify" aria-label="Notification area">
      <div class="taskbar-tray" aria-label="System tray">
        <span class="tray-item tray-item--chevron" aria-hidden="true">
          <img class="tray-glyph" src="assets/sidebar_100.ico" alt="" />
        </span>
        <span class="tray-item" aria-hidden="true">
          <img class="tray-glyph" src="assets/wifi.ico" alt="" />
        </span>
        <span class="tray-item" aria-hidden="true">
          <img class="tray-glyph" src="assets/volume.ico" alt="" />
        </span>
        <span class="tray-item tray-item--battery" aria-hidden="true">
          <span class="tray-glyph battery-icon" aria-hidden="true"></span>
        </span>
        <span class="tray-item" aria-hidden="true">
          <img class="tray-glyph" src="assets/ActionCenter_1.ico" alt="" />
        </span>
      </div>
      <div class="clock" id="clock"></div>
    </div>
  </div>
<!-- startmenu -->
<div id="startmenu" class="hidden">
    <ul id="applications">
      <li><a href="#">
        <img src="https://img.icons8.com/color/48/000000/folder-invoices.png" alt="Projects" /> My Projects
      </a></li>
      <li><a href="#">
        <img src="https://img.icons8.com/color/48/000000/email.png" alt="Contact" /> Contact
      </a></li>
      <li><a href="#">
        <img src="https://img.icons8.com/color/48/000000/user-male-circle.png" alt="Profile" /> Profile
      </a></li>
      <li class="search">
        <form><input type="text" placeholder="Search programs and files" /></form>
      </li>
    </ul>
  
    <ul id="sysdir">
      <li class="user">
        <img src="https://img.icons8.com/color/48/000000/user-male-circle.png" alt="User" />
      </li>
      <li><a href="#"><span>Documents</span></a></li>
      <li><a href="#"><span>Pictures</span></a></li>
      <li><a href="#"><span>Music</span></a></li>
      <li><a href="#"><span>Computer</span></a></li>
    </ul>
  </div>
  
  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.2/color-thief.umd.js"></script>
  <script type="module" src="scripts/main.js"></script>
  
</body>
</html>
